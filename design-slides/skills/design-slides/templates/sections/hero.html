<!-- ===== HERO SECTION =====
     Template — adapt content for each video type.
     Structure: Logo → Topic Label → Title (with gradient highlight) → Subtitle → Promise Boxes

     Used by all 3 video types with different content:
     - YouTube: Educational topic, learning promises
     - VSL: Benefit-focused headline, outcome promises
     - Webinar: Big promise, "In the next 60 minutes..." framing
-->

<!-- CSS: All styles for this section are defined in brand/brand.css -->

<!-- HTML -->
<section class="hero" id="hero">
  <img class="hero-logo" src="https://assets.cdn.filesafe.space/lNzgml2EfCzIl04kmDr2/media/69c6dec39fc63ab17f2737ea.png" alt="Logo">
  <p class="hero-topic">VIDEO TOPIC</p>
  <h1 class="hero-title">Your Main Title with <span class="hero-title-highlight">Gradient Highlight</span></h1>
  <p class="hero-subtitle">A clear, compelling subtitle that sets expectations for what the viewer will learn or gain.</p>

  <div class="hero-promises">
    <div class="hero-promise">Discover How To [Achieve Key Outcome]</div>
    <div class="hero-promise">The #1 Strategy for [Desired Result]</div>
    <div class="hero-promise">3 Steps To [Transform Something Specific]</div>
  </div>
</section>
